defaultNamespace: suse-observability
helm:
  chart: https://charts.rancher.com/server-charts/prime/suse-observability/suse-observability-2.8.0.tgz
  releaseName: suse-observability
  valuesFiles:
    - values.yaml
  valuesFrom:
    - secretKeyRef:
        name: fleet-secrets
        namespace: kube-system
        key: suse-observability-values.yaml
labels:
  provides: suse-observability
overrideTargets:
  - clusterSelector:
      matchLabels:
        needs-observability: "true"
diff:
  comparePatches:
    - apiVersion: batch/v1
      kind: Job
      namespace: suse-observability
      name: suse-observability-topic-create
      operations:
        - {"op": "ignore"}