defaultNamespace: cve-demo
namespaceLabels:
  sbomscanner.kubewarden.io/workloadscan: "true"
helm:
  chart: oci://ghcr.io/suse-technical-marketing/mission-control-demo/charts/aria
  releaseName: aria
  version: "0.7.0"
  values:
    ingress:
      host: ${ if hasKey .ClusterAnnotations "hosted-domain" }aria.${ .ClusterName }.${ get .ClusterAnnotations "hosted-domain" }${ else}http://localhost${ end}
overrideTargets:
  - clusterSelector:
      matchLabels:
        needs-cve-demo: "true"
