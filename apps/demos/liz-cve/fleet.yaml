defaultNamespace: cve-demo
namespaceLabels:
  sbomscanner.kubewarden.io/workloadscan: "true"
helm:
  repo: https://apache.github.io/apisix-helm-chart
  chart: apisix
  releaseName: apisix
  values:
    global:
      defaultStorageClass: "longhorn-single"
overrideTargets:
  - clusterSelector:
      matchLabels:
        needs-cve-demo: "true"
