defaultNamespace: cve-demo
namespaceLabels:
  sbomscanner.kubewarden.io/workloadscan: "true"
helm:
  repo: https://argoproj.github.io/argo-helm
  chart: argo-cd
  releaseName: argo-cd
  values:
    global:
      defaultStorageClass: "longhorn-single"
overrideTargets:
  - clusterSelector:
      matchLabels:
        needs-cve-demo: "true"
