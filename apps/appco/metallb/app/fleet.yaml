defaultNamespace: metallb-system
helm:
  chart: oci://dp.apps.rancher.io/charts/metallb
  releaseName: metallb
  version: "0.15.3"
  values:
    global:
      imagePullSecrets: ["application-collection"]

overrideTargets:
  - clusterSelector:
      matchLabels:
        needs-metallb: "true"

labels:
  provides: load-balancer
